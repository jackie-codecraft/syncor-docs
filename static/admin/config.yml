backend:
  name: git-gateway
  branch: main

# For local development: run `npx decap-server` and set local_backend: true
# local_backend: true

media_folder: static/img/uploads
public_folder: /img/uploads

# ─── SHARED PAGE FIELDS ───────────────────────────────────────────────────────
# Used by every documentation section collection below.

# ─── COLLECTIONS ─────────────────────────────────────────────────────────────

collections:

  # ── SECTIONS ────────────────────────────────────────────────────────────────
  # Creates _category_.json files that define the sidebar section labels/order.
  # Step 1: Create a section here.
  # Step 2: Ask Jackie to add a matching collection below so pages can be edited.
  - name: sections
    label: Sidebar Sections
    label_singular: Section
    description: >
      Sections control the top-level groupings shown in the documentation
      sidebar. Create a section here first, then add pages to it using
      the matching section collection below.
    folder: docs
    path: '{{slug}}/_category_'
    create: true
    format: json
    summary: '{{label}} (position {{position}})'
    fields:
      - name: label
        label: Section Name
        widget: string
        hint: 'Shown as the sidebar heading (e.g. "Placing Orders")'
      - name: position
        label: Sidebar Position
        widget: number
        default: 99
        hint: 'Lower numbers appear first. Existing sections use positions 1–9.'
      - name: description
        label: Description (optional)
        widget: text
        required: false
        hint: 'Optional. Used on the generated section index page.'

  # ── GETTING STARTED ──────────────────────────────────────────────────────────
  - name: getting_started
    label: Getting Started
    label_singular: Page
    folder: docs/getting-started
    create: true
    format: frontmatter
    summary: '{{title}}'
    fields:
      - name: title
        label: Title
        widget: string
      - name: sidebar_position
        label: Position in Section
        widget: number
        default: 99
        hint: 'Lower numbers appear first within this section.'
      - name: description
        label: Short Description (optional)
        widget: text
        required: false
        hint: 'Shown in search results and link previews.'
      - name: body
        label: Content
        widget: markdown

  # ── DASHBOARD ────────────────────────────────────────────────────────────────
