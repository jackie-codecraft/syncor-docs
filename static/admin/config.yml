backend:
  name: git-gateway
  branch: main

# For local development: run `npx decap-server` and set local_backend: true
# local_backend: true

media_folder: static/img/uploads
public_folder: /img/uploads

# ─── COLLECTIONS ─────────────────────────────────────────────────────────────

collections:

  # ── DOCUMENTATION PAGES ───────────────────────────────────────────────────────
  # All documentation pages, across all sections.
  # Pick a section from the dropdown — the page is saved to the right folder
  # automatically.
  #
  # ADDING A NEW SECTION: add a new option to the section field below, then
  # create docs/<folder_name>/_category_.json in the repo.
  - name: docs
    label: Documentation Pages
    label_singular: Page
    description: >
      All documentation pages. Pick a section from the dropdown to place
      the page in the right part of the sidebar.
    folder: docs
    path: '{{fields.section}}/{{slug}}'
    create: true
    format: frontmatter
    summary: '{{title}} — {{section}}'
    identifier_field: title
    fields:
      - name: title
        label: Title
        widget: string
      - name: section
        label: Section
        widget: select
        options:
          - { label: "Getting Started",   value: "getting-started" }
          - { label: "Your Dashboard",    value: "dashboard" }
          - { label: "Browsing Products", value: "catalogue" }
          - { label: "Purchase Requests", value: "purchase-requests" }
          - { label: "Approvals",         value: "approvals" }
          - { label: "Sourcing Requests", value: "sourcing" }
          - { label: "Notifications",     value: "notifications" }
          - { label: "Your Profile",      value: "profile" }
          - { label: "Budgets",           value: "budgets" }
          - { label: "Administration",    value: "administration" }
        hint: >
          Pick which section this page belongs to.
          To add a new section, contact the site developer.
      - name: sidebar_position
        label: Position within Section
        widget: number
        default: 99
        hint: 'Lower numbers appear first within the section.'
      - name: description
        label: Short Description (optional)
        widget: text
        required: false
        hint: 'Shown in search results and link previews.'
      - name: body
        label: Content
        widget: markdown
