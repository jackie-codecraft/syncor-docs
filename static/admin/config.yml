backend:
  name: git-gateway
  branch: main

# For local development: run `npx decap-server` and set local_backend: true
# local_backend: true

media_folder: static/img/uploads
public_folder: /img/uploads

# ─── PAGE FIELDS ─────────────────────────────────────────────────────────────
# Shared field definitions (YAML anchors)

# ─── COLLECTIONS ─────────────────────────────────────────────────────────────
# Each section is its own collection. The folder IS the section — no path
# templates needed. To add a new section, add a new collection here and
# create docs/<folder>/_category_.json in the repo.

collections:

  - name: getting_started
    label: "Getting Started"
    label_singular: Page
    folder: docs/getting-started
    create: true
    format: frontmatter
    summary: '{{title}}'
    fields:
      - { name: title, label: Title, widget: string }
      - { name: sidebar_position, label: "Position within Section", widget: number, default: 99, hint: "Lower numbers appear first." }
      - { name: description, label: "Short Description (optional)", widget: text, required: false, hint: "Shown in search results and link previews." }
      - { name: body, label: Content, widget: markdown }

  - name: dashboard
    label: "Your Dashboard"
