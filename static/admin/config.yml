backend:
  name: git-gateway
  branch: main

# For local development: run `npx decap-server` and set local_backend: true
# local_backend: true

media_folder: static/img/uploads
public_folder: /img/uploads

# ─── COLLECTIONS ─────────────────────────────────────────────────────────────

collections:

  # ── SIDEBAR SECTIONS ─────────────────────────────────────────────────────────
  # Manages the top-level groupings in the documentation sidebar.
  # Create a section here — it will immediately appear as an option when
  # creating or editing documentation pages below.
  #
  # NOTE: Section data is stored in data/sections/ (outside docs/).
  # When adding a brand-new section, a developer must also create
  # docs/<folder_name>/_category_.json in the repo to set the sidebar label.
  - name: sections
    label: Sidebar Sections
    label_singular: Section
    description: >
      Sections are the top-level groups in the documentation sidebar.
      Create a section here first, then use "Documentation Pages" to add
      pages to it. New sections appear instantly in the section dropdown.
    folder: data/sections
    slug: '{{fields.folder_name}}'
    identifier_field: label
    create: true
    format: json
    summary: '{{label}} ({{folder_name}}, position {{position}})'
    fields:
      - name: label
        label: Section Name
        widget: string
        hint: 'Shown as the sidebar heading (e.g. "Release Notes")'
      - name: folder_name
        label: Folder Name
        widget: string
        hint: >
          Lowercase letters and hyphens only (e.g. "release-notes"). Must be unique.
          This determines where pages are saved in the repo — do not change after creating pages.
        pattern: ['^[a-z][a-z0-9-]*$', 'Lowercase letters and hyphens only, no spaces']
      - name: position
        label: Sidebar Position
        widget: number
        default: 99
        hint: 'Lower numbers appear first. Current sections use positions 1–10.'

  # ── DOCUMENTATION PAGES ───────────────────────────────────────────────────────
  # All documentation pages, across all sections.
  # Pick a section from the dropdown — the page is saved to the right folder
  # automatically. New sections created above appear here immediately.
  - name: docs
    label: Documentation Pages
    label_singular: Page
    description: >
      All documentation pages. Pick a section from the dropdown to place
      the page in the right part of the sidebar. You can create, edit,
      and delete pages here across all sections.
    folder: docs
    path: '{{fields.section}}/{{slug}}'
    create: true
    format: frontmatter
    summary: '{{title}} — {{section}}'
    identifier_field: title
    fields:
      - name: title
        label: Title
        widget: string
      - name: section
        label: Section
        widget: relation
        collection: sections
        search_fields: ['label']
        value_field: 'folder_name'
        display_fields: ['label']
        hint: >
          Pick which section this page belongs to. New sections created in
          "Sidebar Sections" appear here automatically.
      - name: sidebar_position
        label: Position within Section
        widget: number
        default: 99
        hint: 'Lower numbers appear first within the section.'
      - name: description
        label: Short Description (optional)
        widget: text
        required: false
        hint: 'Shown in search results and link previews.'
      - name: body
        label: Content
        widget: markdown
